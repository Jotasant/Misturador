# render.yaml — Blueprint de deploy para Render.com
# Documentação: https://render.com/docs/blueprint-spec
#
# ANTES DE FAZER O PRIMEIRO DEPLOY:
#   1. Crie um repositório no GitHub e envie este projeto
#   2. No Render Dashboard, clique em "New > Blueprint" e aponte para o repositório
#   3. Defina as variáveis marcadas com `sync: false` no dashboard (são os segredos)
#
# URLS GERADAS (ajuste se o Render adicionar sufixo ao nome):
#   Backend : https://sima-backend.onrender.com
#   Frontend: https://sima-frontend.onrender.com

services:
  # ---------------------------------------------------------------------------
  # BACKEND — FastAPI (Python nativo)
  # ---------------------------------------------------------------------------
  - type: web
    name: sima-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free

    envVars:
      # Banco de dados — SQLite em disco efêmero (dados resetam a cada deploy).
      # Para persistência, adicione um Render Disk em /data e use:
      #   DATABASE_URL=sqlite:////data/sima_database.db
      - key: DATABASE_URL
        value: sqlite:///./sima_database.db

      # MQTT — HiveMQ Cloud
      - key: MQTT_BROKER
        value: 049fb2c96f2a458c8b99e9c1bec35df8.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: 8883
      - key: MQTT_USER
        value: sysima
      - key: MQTT_PASSWORD
        sync: false   # ← Defina no Render Dashboard (Secrets)
      - key: MQTT_CLIENT_ID
        value: sima_backend_render

      # CORS — domínio do frontend no Render
      # Se o Render alterar o nome do serviço, atualize aqui também.
      - key: ALLOWED_ORIGINS
        value: https://sima-frontend.onrender.com,http://localhost:3000

  # ---------------------------------------------------------------------------
  # FRONTEND — Next.js (Node)
  # ---------------------------------------------------------------------------
  - type: web
    name: sima-frontend
    env: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    plan: free

    envVars:
      # Aponta para o backend no Render.
      # NEXT_PUBLIC_* são embutidas no bundle no momento do build —
      # qualquer alteração exige redeploy do frontend.
      - key: NEXT_PUBLIC_API_URL
        value: https://sima-backend.onrender.com/api
      - key: NEXT_PUBLIC_WS_URL
        value: wss://sima-backend.onrender.com/api/ws
      - key: NODE_VERSION
        value: 20
